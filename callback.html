<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting to SPremier…</title>
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; }
    a { color: #2452E8; font-size: 18px; }
  </style>
</head>
<body>
  <p>Redirecting to SPremier…</p>
  <p><a href="spremier://callback" id="fallback-link">Click here if you aren't redirected automatically</a></p>

  <script>
    (function() {
      // Build the spremier:// URL with the same query string
      var target = "spremier://callback" + window.location.search;
      // Try automatic redirect
      window.location.replace(target);

      // Also update the fallback link to include the query string
      var fallback = document.getElementById("fallback-link");
      if (fallback) {
        fallback.setAttribute("href", target);
      }
    })();
  </script>
</body>
</html>
