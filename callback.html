<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPremier OAuth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
  <p>Redirecting to SPremier...</p>
  <p><a id="fallback-link">Click here to open SPremier</a></p>

  <script>
    const target = 'spremier://callback' + window.location.search + window.location.hash;
    const link = document.getElementById('fallback-link');
    link.href = target;
    window.location.href = target;
  </script>
</body>
</html>
