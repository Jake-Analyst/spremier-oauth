<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SPremier OAuth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; }
    a { color: #2452E8; font-size: 18px; }
  </style>
</head>
<body>
  <p>Redirecting to SPremier…</p>
  <p>
    <a href="https://jake-analyst.github.io/spremier-oauth/callback" id="fallback-link">
      Click here if you aren't redirected automatically
    </a>
  </p>
  <script>
    (function() {
      var qs = window.location.search;
      var link = document.getElementById("fallback-link");
      var target = "https://jake-analyst.github.io/spremier-oauth/callback" + qs;
      if (link) link.setAttribute("href", target);
      // Attempt automatic redirect; App Links will intercept this
      window.location.href = target;
    })();
  </script>
</body>
</html>
