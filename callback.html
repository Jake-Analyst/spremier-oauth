<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Redirecting to SPremier…</title>
  <meta http-equiv="refresh" content="0; url=spremier://callback" id="meta-refresh">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 40px; }
    a { color: #2452E8; font-size: 18px; }
  </style>
</head>
<body>
  <p>Redirecting to SPremier…</p>
  <p>
    <a href="spremier://callback" id="fallback-link">Click here if you aren't redirected automatically</a>
  </p>
  <script>
    (function() {
      var qs = window.location.search; // includes the leading '?'
      var meta = document.getElementById("meta-refresh");
      var link = document.getElementById("fallback-link");
      if (qs) {
        if (meta) meta.setAttribute("content", "0; url=spremier://callback" + qs);
        if (link) link.setAttribute("href", "spremier://callback" + qs);
      }
    })();
  </script>
</body>
</html>
